name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  checks-linux:
    name: Lint / Types / Tests (Linux, headless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (headless: no flet)
        run: |
          python -m pip install --upgrade pip
          # CI uses requirements/ci.txt (no flet — headless environment).
          # Flet requires a display; all domain/infra tests run without it.
          python -m pip install -r requirements/ci.txt -r requirements/dev.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Type check (mypy on src/core + src/infra)
        run: python -m mypy

      - name: Tests (pytest)
        run: python -m pytest -q

      - name: Dependency audit (pip-audit)
        run: python -m pip_audit -r requirements/ci.txt -r requirements/dev.txt

  checks-windows:
    name: UI imports + tests (Windows, full deps)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install full app dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/app.txt -r requirements/dev.txt

      - name: Tests (pytest, with flet available)
        # На Windows-runner'е установлен flet — это включит UI smoke-тесты
        # (test_smoke::test_entrypoint_importable / test_flet_ui_importable),
        # которые ловят регрессии импортов UI, не видимые в headless-job.
        run: python -m pytest -q
